<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stan LiveOps</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #0073fc;
      --muted: #444;
      --text: #e0e0e0;
      --text-dim: #666;
      --font: 'Inconsolata', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 48px 24px;
    }

    header {
      max-width: 720px;
      margin: 0 auto 56px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    header span {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 64px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    /* ── Tool cards ── */
    .tools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 520px) {
      .tools-grid { grid-template-columns: 1fr; }
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      display: block;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }

    .tool-card:hover {
      border-color: var(--accent);
      background: #161616;
    }

    .tool-card:hover .card-arrow {
      opacity: 1;
      transform: translate(2px, -2px);
    }

    /* embed image area */
    .card-image {
      width: 100%;
      aspect-ratio: 16/9;
      background: #181818;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-image-placeholder {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .card-body {
      padding: 16px 18px 18px;
    }

    .card-label {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-arrow {
      font-size: 0.9rem;
      opacity: 0.3;
      transition: opacity 0.15s, transform 0.15s;
    }

    .card-desc {
      font-size: 0.75rem;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .card-tbd {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      font-style: italic;
    }

    /* ── Deprecated list ── */
    .deprecated-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid var(--border);
    }

    .deprecated-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-dim);
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      transition: background 0.1s, color 0.1s;
    }

    .deprecated-item:last-child { border-bottom: none; }

    .deprecated-item:hover {
      background: #141414;
      color: var(--text);
    }

    .dep-tag {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #3a3a3a;
      font-weight: 600;
    }

    footer {
      max-width: 720px;
      margin: 64px auto 0;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<header>
  <h1 id="site-title">Stan LiveOps</h1>
  <span>internal tools</span>
</header>

<main>
  <section id="tools-section">
    <div class="section-label">Tools</div>
    <div class="tools-grid" id="tools-grid"></div>
  </section>

  <section id="deprecated-section">
    <div class="section-label">Deprecated</div>
    <div class="deprecated-list" id="deprecated-list"></div>
  </section>
</main>

<footer id="footer-text">config.json · edit to update links and labels</footer>

<script>
  async function load() {
    let config;
    try {
      const res = await fetch('config.json');
      if (!res.ok) throw new Error('config.json not found');
      config = await res.json();
    } catch (e) {
      document.body.innerHTML = `<div style="font-family:var(--font);color:#666;padding:48px;font-size:0.8rem;letter-spacing:0.1em;">could not load config.json — make sure it's in the same folder.</div>`;
      return;
    }

    // Site title
    document.title = config.site?.title || 'Tools';
    document.getElementById('site-title').textContent = config.site?.title || 'Tools';

    // Tools
    const grid = document.getElementById('tools-grid');
    grid.innerHTML = '';
    for (const tool of config.tools || []) {
      const isTbd = !tool.url || tool.url === '#' || tool.description?.toLowerCase() === 'tbd';
      const card = document.createElement('a');
      card.href = tool.url || '#';
      if (!isTbd) card.target = '_blank';
      card.className = 'tool-card';
      card.innerHTML = `
        <div class="card-image">
          ${tool.image
            ? `<img src="${tool.image}" alt="${tool.label}" onerror="this.parentElement.innerHTML='<span class=card-image-placeholder>${tool.label}</span>'">`
            : `<span class="card-image-placeholder">${isTbd ? 'coming soon' : tool.label}</span>`}
        </div>
        <div class="card-body">
          <div class="card-label">
            ${tool.label}
            <span class="card-arrow">↗</span>
          </div>
          ${isTbd
            ? `<div class="card-tbd">tbd</div>`
            : `<div class="card-desc">${tool.description || ''}</div>`}
        </div>
      `;
      grid.appendChild(card);
    }

    // Deprecated
    const depList = document.getElementById('deprecated-list');
    depList.innerHTML = '';
    for (const item of config.deprecated || []) {
      const a = document.createElement('a');
      a.href = item.url || '#';
      a.className = 'deprecated-item';
      a.innerHTML = `<span>${item.label}</span><span class="dep-tag">deprecated</span>`;
      depList.appendChild(a);
    }
  }

  load();
</script>
</body>
</html>
